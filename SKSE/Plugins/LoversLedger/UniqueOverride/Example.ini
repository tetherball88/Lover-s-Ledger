; LoversLedger — Unique NPC Overrides
; =====================================
; Drop any number of .ini files in this folder. All of them are loaded and
; merged automatically, so mods and users can each ship their own file
; without overwriting each other.
;
; Still don't use it on generic NPCs like "Bandit01" or "Guard02" — only on named NPCs that you want to be treated as unique.
; For example Illia is pretty unique npc, but for some reason Bethesda didn't mark her as unique, so you can add her here to make sure she gets tracked by Lover's Ledger.
;
; Add entries under [UniqueNPCs] to force Lover's Ledger to track an NPC
; as unique, even when the game data does not mark them as unique.
;
; IMPORTANT: USE THE TESNPC BASE FORM ID, NOT THE ACTOR REFERENCE ID
; -------------------------------------------------------------------
; In xEdit/SSEEdit, every NPC has two kinds of records:
;   - The BASE form (TESNPC) — this is what you want. It defines the NPC's
;     stats, name, appearance, and the Unique flag. Its FormID appears in
;     the NPC_ record at the top of the record list for that NPC.
;   - Placed references (ACHR) — these are instances of the NPC placed in a
;     cell. Do NOT use these FormIDs here; they will not be found.
;
; In xEdit, right-click the NPC_ record → "Copy FormID" to get the base FormID.
; The EditorID is the string in the "Editor ID" column of that same record.
;
; SUPPORTED FORMATS
; -----------------
; EditorID of the TESNPC base form (from the Creation Kit / xEdit):
;   dunDarklightIllia=1
;
; PluginName:LocalFormID of the TESNPC base form (hex, with or without 0x prefix):
;   Skyrim.esm:0x00048c2f=1
;   Skyrim.esm:48C2F=1
;
; The value on the right side of = is ignored; only the key is read.
; Lines starting with ; or # are comments. Blank lines are ignored.

[UniqueNPCs]
; -- Uncomment examples below or add your own --
;dunDarklightIllia=1
;HousecarlWhiterun=1
;Skyrim.esm:0x00048C2F=1
